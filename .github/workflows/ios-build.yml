name: iOS Build (MeloNX)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/MeloNX/**'
      - 'src/Ryujinx.Headless.SDL2/**'
      - 'distribution/ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Build Ryujinx.Headless.SDL2 dylib
        run: |
          chmod +x distribution/ios/xc-compile.sh
          ./distribution/ios/xc-compile.sh

      - name: Build MeloNX (unsigned)
        run: |
          xcodebuild \
            -project src/MeloNX/MeloNX.xcodeproj \
            -scheme MeloNX \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive derived data logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: |
            ~/Library/Logs/DiagnosticReports
            ~/Library/Developer/Xcode/DerivedData
          if-no-files-found: ignore

      - name: Package build outputs
        if: success()
        run: |
          mkdir -p artifacts
          find ~/Library/Developer/Xcode/DerivedData -type d -name "Build" -maxdepth 6 -print0 | while IFS= read -r -d '' d; do
            cp -R "$d" "artifacts/" || true
          done

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: melonx-ios-build
          path: artifacts
          if-no-files-found: warn
