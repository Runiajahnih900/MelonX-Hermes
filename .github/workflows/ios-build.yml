name: iOS Build (MeloNX)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/MeloNX/**'
      - 'src/Ryujinx.Headless.SDL2/**'
      - 'distribution/ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Build Ryujinx.Headless.SDL2 dylib
        run: |
          chmod +x distribution/ios/get_dotnet.sh distribution/ios/xc-compile.sh
          bash distribution/ios/xc-compile.sh

      - name: Build MeloNX (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project src/MeloNX/MeloNX.xcodeproj \
            -scheme MeloNX \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build | tee xcodebuild.log

      - name: Create unsigned IPA
        if: success()
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -path "*/Build/Products/Release-iphoneos/*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Release .app not found"
            exit 1
          fi

          mkdir -p artifacts/Payload
          cp -R "$APP_PATH" artifacts/Payload/
          (cd artifacts && /usr/bin/zip -qry MeloNX-unsigned.ipa Payload)

      - name: Archive build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-logs
          path: |
            xcodebuild.log
            ~/Library/Logs/DiagnosticReports
          if-no-files-found: ignore

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: melonx-unsigned-ipa
          path: artifacts/MeloNX-unsigned.ipa
          if-no-files-found: error
