name: iOS IPA (unsigned)

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (supports new project format)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show selected Xcode
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Ensure iOS helper scripts are executable
        run: |
          chmod +x distribution/ios/get_dotnet.sh distribution/ios/xc-compile.sh
          ls -l distribution/ios/get_dotnet.sh distribution/ios/xc-compile.sh

      - name: Build Headless dylib (ios-arm64)
        run: |
          dotnet restore src/Ryujinx.Headless.SDL2/Ryujinx.Headless.SDL2.csproj
          dotnet publish -c Release -r ios-arm64 -p:ExtraDefineConstants=DISABLE_UPDATER src/Ryujinx.Headless.SDL2 --self-contained true

      - name: Copy dylib into MeloNX app deps
        run: |
          cp src/Ryujinx.Headless.SDL2/bin/Release/net8.0/ios-arm64/native/Ryujinx.Headless.SDL2.dylib \
             "src/MeloNX/MeloNX/Dependencies/Dynamic Libraries/Ryujinx.Headless.SDL2.dylib"

      - name: Build iOS app (no signing)
        run: |
          xcodebuild \
            -project src/MeloNX/MeloNX.xcodeproj \
            -scheme MeloNX \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/MeloNX.app"
          test -d "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -r MeloNX-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-unsigned-ipa
          path: MeloNX-unsigned.ipa
